services:
  - type: web
    name: re-analyzer-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
    healthCheckPath: /health

  - type: web
    name: re-analyzer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://re-analyzer-backend.onrender.com
